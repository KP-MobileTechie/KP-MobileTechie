<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" fill="none" role="img" aria-label="GitHub streak: 86 day current streak, 86 longest, 1374 total contributions">
  <defs>
    <radialGradient id="s-glowA" cx="12%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="55%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s-glowB" cx="95%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.10"/>
      <stop offset="55%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="s-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="s-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="s-dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#e7e9ee" fill-opacity="0.03"/>
    </pattern>
  </defs>
  <style>
    text { font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; }
    @keyframes popin { from { opacity: 0; transform: translateY(8px) scale(.92); }
                        to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
    .pop { opacity: 0; animation: popin .7s cubic-bezier(.2,.8,.2,1) forwards; transform-box: fill-box; transform-origin: center; }
    .pop2 { animation-delay: .12s; }
    .pop3 { animation-delay: .24s; }
    .drawline { animation: draw 1.4s ease forwards; }
    .glowpulse { animation: pulse 3s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .pop { animation: none; opacity: 1; transform: none; }
      .drawline { animation: none; stroke-dashoffset: 0 !important; }
      .glowpulse { animation: none; opacity: 1; }
    }
  </style>
  <style>
    .side { font: 600 24px ui-monospace, 'Cascadia Code', 'Segoe UI Mono', Consolas, monospace; fill: #e7e9ee; }
    .cur { font: 700 36px ui-monospace, 'Cascadia Code', 'Segoe UI Mono', Consolas, monospace; fill: #22d3ee; }
    .lab { font: 400 10px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #8b8ba7; letter-spacing: 1.6px; }
    .clab { font: 700 11px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #a78bfa; letter-spacing: 1.6px; }
    .date { font: 400 10px ui-monospace, 'Cascadia Code', 'Segoe UI Mono', Consolas, monospace; fill: #8b8ba7; }
    .c { text-anchor: middle; }
  </style>
  <rect width="495" height="195" rx="12" fill="#06060b"/>
  <rect width="495" height="195" rx="12" fill="url(#s-glowA)"/>
  <rect width="495" height="195" rx="12" fill="url(#s-glowB)"/>
  <rect width="495" height="195" rx="12" fill="url(#s-dots)"/>
  <rect x="14" y="30" width="137" height="135" rx="10" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.07)"/><rect x="179" y="30" width="137" height="135" rx="10" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.07)"/><rect x="344" y="30" width="137" height="135" rx="10" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.07)"/>

  <g class="pop">
    <text class="side c" x="82" y="82">1374</text>
    <text class="lab c" x="82" y="108">TOTAL</text>
    <text class="date c" x="82" y="150">Jul 19, 2021 - Jul 9, 2026</text>
  </g>

  <g class="pop pop2">
    <circle cx="248" cy="72" r="34" stroke="rgba(255,255,255,.08)" stroke-width="4"/>
    <circle class="drawline glowpulse" cx="248" cy="72" r="34" stroke="url(#s-ring)" stroke-width="4"
            stroke-linecap="round" stroke-dasharray="214" stroke-dashoffset="214"
            transform="rotate(-90 248 72)" filter="url(#s-glow)"/>
    <text class="cur c" x="248" y="84">86</text>
    <text class="clab c" x="248" y="124">CURRENT STREAK</text>
    <text class="date c" x="248" y="150">Apr 15, 2026 - Jul 9, 2026</text>
    <path transform="translate(240,22) scale(0.75)" fill="#f472b6" filter="url(#s-glow)" d="M9 0c.5 3-1.7 4.3-2.8 5.8C4.9 7.6 4 9.3 4 11.2 4 14.4 6.2 17 9 17s5-2.6 5-5.8c0-2.4-1.4-3.9-2.3-5.4C10.9 4.5 11 2 9 0z"/>
  </g>

  <g class="pop pop3">
    <text class="side c" x="412" y="82">86</text>
    <text class="lab c" x="412" y="108">LONGEST</text>
    <text class="date c" x="412" y="150">Apr 15, 2026 - Jul 9, 2026</text>
  </g>
</svg>
