<svg xmlns="http://www.w3.org/2000/svg" width="495" height="172" viewBox="0 0 495 172" fill="none" role="img" aria-label="Contribution streak: 99 day current streak, 99 longest, 1395 total contributions">
  <defs>
    <linearGradient id="s-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blip { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    .fade { animation: fadein .8s ease-out; }
    .live { animation: blip 2.4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .fade { animation: none; }
      .live { animation: none; opacity: 1; }
    }
  </style>
  <style>
    .eyebrow { font: 700 10px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #7d8590; letter-spacing: 2.4px; }
    .meta { font: 600 10px ui-monospace, 'Cascadia Code', 'Segoe UI Mono', Consolas, monospace; fill: #7d8590; }
    .num { font: 500 34px ui-monospace, 'Cascadia Code', 'Segoe UI Mono', Consolas, monospace; fill: #f0f6fc; letter-spacing: -1px; text-anchor: middle; }
    .hero { font-weight: 700; fill: #22d3ee; }
    .lab { font: 700 9.5px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #7d8590; letter-spacing: 1.8px; text-anchor: middle; }
    .cap { font: 400 9.5px ui-monospace, 'Cascadia Code', 'Segoe UI Mono', Consolas, monospace; fill: #7d8590; text-anchor: middle; }
  </style>
  <rect x="0.5" y="0.5" width="494" height="171" rx="13" fill="#0d1117" stroke="rgba(240,246,252,0.10)"/>
  <g class="fade">
    <text class="eyebrow" x="30" y="40">CONTRIBUTION STREAK</text>
    <circle class="live" cx="413" cy="36" r="3" fill="#22d3ee"/>
    <text class="meta" x="423" y="40">active</text>
    <line x1="30" y1="56" x2="465" y2="56" stroke="rgba(240,246,252,0.10)"/>
    <text class="num" x="102.5" y="104">1,395</text><text class="lab" x="102.5" y="126">TOTAL</text><line x1="91.5" y1="134" x2="113.5" y2="134" stroke="rgba(240,246,252,0.10)" stroke-width="1.5"/><text class="cap" x="102.5" y="152">since Jul '21</text><text class="num hero" x="247.5" y="104">99</text><text class="lab" x="247.5" y="126">CURRENT</text><line x1="232.5" y1="134" x2="262.5" y2="134" stroke="#22d3ee" stroke-width="1.5"/><text class="cap" x="247.5" y="152">Apr 15 – Jul 22</text><text class="num" x="392.5" y="104">99</text><text class="lab" x="392.5" y="126">LONGEST</text><line x1="381.5" y1="134" x2="403.5" y2="134" stroke="rgba(240,246,252,0.10)" stroke-width="1.5"/><text class="cap" x="392.5" y="152">Apr 15 – Jul 22</text>
  </g>
</svg>
