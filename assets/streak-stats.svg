<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" fill="none" role="img" aria-label="GitHub streak stats">
  <style>
    .num { font: 700 28px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #e7e9ee; }
    .cur-num { font: 700 34px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #22d3ee; }
    .lab { font: 400 14px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #8b8ba7; }
    .cur-lab { font: 700 14px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #a78bfa; letter-spacing: .5px; }
    .date { font: 400 11px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #8b8ba7; }
    text { text-anchor: middle; dominant-baseline: middle; }
  </style>
  <rect width="495" height="195" rx="6" fill="#06060b"/>
  <!-- dividers -->
  <line x1="165" y1="35" x2="165" y2="160" stroke="#8b8ba7" stroke-opacity="0.25"/>
  <line x1="330" y1="35" x2="330" y2="160" stroke="#8b8ba7" stroke-opacity="0.25"/>

  <!-- total (left) -->
  <text class="num" x="82" y="62">1374</text>
  <text class="lab" x="82" y="92">Total Contributions</text>
  <text class="date" x="82" y="140">Jul 19, 2021 - Jul 9, 2026</text>

  <!-- current streak (center) -->
  <circle cx="248" cy="62" r="34" fill="none" stroke="#22d3ee" stroke-width="3"/>
  <text class="cur-num" x="248" y="64">86</text>
  <text class="cur-lab" x="248" y="118">Current Streak</text>
  <text class="date" x="248" y="140">Apr 15, 2026 - Jul 9, 2026</text>
  <!-- fire -->
  <path transform="translate(238,20) scale(0.9)" fill="#f472b6" d="M9 0c.5 3-1.7 4.3-2.8 5.8C4.9 7.6 4 9.3 4 11.2 4 14.4 6.2 17 9 17s5-2.6 5-5.8c0-2.4-1.4-3.9-2.3-5.4C10.9 4.5 11 2 9 0zm.1 16c-1.5 0-2.6-1.2-2.6-2.7 0-1.4 1-2.3 1.6-3.1.3.9 1 1.3 1.8 1.9.6.5 1.2 1.1 1.2 2 0 1.1-.8 1.9-2 1.9z"/>

  <!-- longest streak (right) -->
  <text class="num" x="412" y="62">86</text>
  <text class="lab" x="412" y="92">Longest Streak</text>
  <text class="date" x="412" y="140">Apr 15, 2026 - Jul 9, 2026</text>
</svg>
