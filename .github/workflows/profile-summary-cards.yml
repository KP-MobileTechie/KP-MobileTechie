name: Generate Profile Summary Cards

on:
  schedule:
    # Runs daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "profile-summary-card-output/**"
      - "profile-cards/**"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate summary cards (SVG)
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: 5

      - name: Convert cards to PNG
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin fonts-dejavu fonts-ubuntu || sudo apt-get install -y -qq librsvg2-bin fonts-dejavu
          git pull --rebase origin main
          mkdir -p profile-cards
          for f in profile-summary-card-output/tokyonight/*.svg; do
            name="$(basename "${f%.svg}")"
            rsvg-convert --width 1400 --keep-aspect-ratio "$f" -o "profile-cards/${name}.png"
          done

      - name: Commit PNG cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-cards
          git diff --staged --quiet || git commit -m "chore: update profile card PNGs"
          git push
